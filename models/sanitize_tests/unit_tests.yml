  - name: test_priority_reorder_trim_before_nullif_empty
    model: stg_sanitize_stacked_test
    description: >
      Tags declared in wrong order (nullif_empty=4, trim=1).
      Input "  " (spaces only): if trim runs first → "" → nullif_empty → NULL (correct).
      If wrong order: nullif_empty sees "  " (not empty) → passes → trim → "" (NOT null).
      NULL result proves reorder_tags() ran trim before nullif_empty.
    given:
      - input: ref('raw_sanitize_stacked_test')
        rows:
          - {id: 1, col_priority_str: "  ", col_priority_chain: "hello", col_regex_chain: "hello", col_case_2_numeric: 1, col_case_2_date: "2024-01-15", col_case_3_date: "2024-01-15"}
