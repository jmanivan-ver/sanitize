version: 2

models:
  - name: stg_sanitize_test
    description: >
      Unit-test scaffold that applies all 16 built-in sanitization tags to individual
      test columns via sanitize_columns. Data is provided entirely by unit_tests.yml
      given: blocks — this model is never run against real data in CI.
    config:
      tags: ['sanitize_test']
    columns:
      - name: id
        description: Surrogate row identifier. Not sanitized.

      - name: col_trim
        description: Result of sanitize:trim — leading/trailing whitespace removed.
        config:
          tags: ['sanitize:trim']

      - name: col_normalize_whitespace
        description: Result of sanitize:normalize_whitespace — interior whitespace collapsed to a single space.
        config:
          tags: ['sanitize:normalize_whitespace']

      - name: col_strip_special
        description: Result of sanitize:strip_special — non-alphanumeric characters (except spaces) removed.
        config:
          tags: ['sanitize:strip_special']

      - name: col_upper
        description: Result of sanitize:upper — converted to uppercase.
        config:
          tags: ['sanitize:upper']

      - name: col_lower
        description: Result of sanitize:lower — converted to lowercase.
        config:
          tags: ['sanitize:lower']

      - name: col_title
        description: Result of sanitize:title — converted to title case via INITCAP.
        config:
          tags: ['sanitize:title']

      - name: col_nullif_empty
        description: Result of sanitize:nullif_empty — empty strings converted to NULL.
        config:
          tags: ['sanitize:nullif_empty']

      - name: col_nullif_zero
        description: Result of sanitize:nullif_zero — zero values converted to NULL.
        config:
          tags: ['sanitize:nullif_zero']

      - name: col_nullif_negative
        description: Result of sanitize:nullif_negative — negative values converted to NULL.
        config:
          tags: ['sanitize:nullif_negative']

      - name: col_round_2
        description: Result of sanitize:round_2 — numeric value rounded to 2 decimal places.
        config:
          tags: ['sanitize:round_2']

      - name: col_round_4
        description: Result of sanitize:round_4 — numeric value rounded to 4 decimal places.
        config:
          tags: ['sanitize:round_4']

      - name: col_abs
        description: Result of sanitize:abs — absolute value (negative sign removed).
        config:
          tags: ['sanitize:abs']

      - name: col_date_floor
        description: Result of sanitize:date_floor — timestamp truncated to day boundary via DATE_TRUNC.
        config:
          tags: ['sanitize:date_floor']

      - name: col_nullif_future
        description: Result of sanitize:nullif_future — dates after today converted to NULL.
        config:
          tags: ['sanitize:nullif_future']

      - name: col_nullif_ancient
        description: Result of sanitize:nullif_ancient — dates before 1900-01-01 converted to NULL.
        config:
          tags: ['sanitize:nullif_ancient']

      - name: col_normalize_phone
        description: Result of sanitize:normalize_phone — all non-digit characters removed.
        config:
          tags: ['sanitize:normalize_phone']

  - name: stg_sanitize_stacked_test
    description: >
      Unit-test scaffold for optimization strategy coverage. Tags are deliberately declared
      in the WRONG priority order on every column to prove that reorder_tags() corrects
      them before SQL is generated. Also exercises 2-way and 3-way CASE merging and
      regex + simple tag nesting order.
    config:
      tags: ['sanitize_test']
    columns:
      - name: id
        description: Surrogate row identifier.
      - name: col_priority_str
        description: >
          Tags declared in wrong order: nullif_empty(4), trim(1).
          Correct execution order is trim first then nullif_empty.
      - name: col_priority_chain
        description: >
          Tags declared in wrong order: nullif_empty(4), upper(3), trim(1).
          Correct execution: trim → upper → nullif_empty.
      - name: col_regex_chain
        description: >
          Tags declared in wrong order: upper(3), strip_special(2,regex), trim(1).
          Correct execution: trim → strip_special → upper.
      - name: col_case_2_numeric
        description: >
          Two CASE tags: nullif_zero and nullif_negative — merged into one CASE expression.
      - name: col_case_2_date
        description: >
          Two CASE date tags: nullif_future and nullif_ancient — merged into one CASE expression.
      - name: col_case_3_date
        description: >
          Three tags: nullif_future(6,case), nullif_ancient(6,case), date_floor(6,simple).
          CASE tags merged + date_floor applied as outer simple transform.
